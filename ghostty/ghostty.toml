# --- 1. 字体排版 ---
font-family = "Maple Mono NF CN"
font-size = 15
font-style = Bold
font-thicken = true
# 如果之前 adjust-height 报错，这里直接设为 0 或删除，依靠 padding 撑开
adjust-cell-height = 5

# --- 2. 窗口与透明磨砂 ---
background-opacity = 0.75
macos-titlebar-style = hidden
window-padding-x = 15
window-padding-y = 12

# --- 3. 光标与鼠标 ---
cursor-style = block
mouse-hide-while-typing = true
copy-on-select = clipboard

# --- 4. Catppuccin Mocha 配色 (直接内置) ---
# 注意：这里去掉了 theme 行，改用 palette 定义
background = 1e1e2e
foreground = cdd6f4
cursor-color = f5e0dc
selection-background = 313244
selection-foreground = cdd6f4

palette = 0=45475a
palette = 1=f38ba8
palette = 2=a6e3a1
palette = 3=f9e2af
palette = 4=89b4fa
palette = 5=f5c2e7
palette = 6=94e2d5
palette = 7=bac2de
palette = 8=585b70
palette = 9=f38ba8
palette = 10=a6e3a1
palette = 11=f9e2af
palette = 12=89b4fa
palette = 13=f5c2e7
palette = 14=94e2d5
palette = 15=a6adc8

# --- 5. 快捷键 ---
keybind = cmd+t=new_tab
keybind = cmd+w=close_surface
keybind = cmd+d=new_split:right
keybind = cmd+shift+d=new_split:down
keybind = global:ctrl+grave_accent=toggle_quick_terminal
keybind = cmd+shift+comma=reload_config