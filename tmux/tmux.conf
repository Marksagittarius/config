bind C-b
set -g prefix C-a
bind C-a send-prefix

# 使用 vi 模式操作（复制、滚动）
setw -g mode-keys vi

# 开启鼠标支持（滚动、选择、点击切换 pane）
set -g mouse on

# 允许快速重载配置
bind r source-file ~/.tmux.conf \; display-message "✔️ Reloaded ~/.tmux.conf"

# 取消默认延迟（提高响应速度）
set -sg escape-time 0

# 终端颜色支持
set -g default-terminal "screen-256color"

##### 分屏与窗口 #####

# 分屏快捷键
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# 快速切换面板
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整面板大小（Alt + 方向键）
bind -n M-Left resize-pane -L 3
bind -n M-Right resize-pane -R 3
bind -n M-Up resize-pane -U 3
bind -n M-Down resize-pane -D 3

##### 状态栏美化 #####

# 状态栏刷新间隔
set -g status-interval 5

# 状态栏样式
set -g status-bg colour234
set -g status-fg white
set -g status-justify centre
set -g status-left-length 60
set -g status-right-length 120

# 左侧显示会话名
set -g status-left "#[fg=green,bold]#S #[fg=white] "

# 右侧显示时间、日期、主机
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M #[fg=green]#(whoami)@#H "

# 激活窗口样式
set-window-option -g window-status-current-format "#[bg=colour33,fg=white,bold] #I:#W "

# 普通窗口样式
set-window-option -g window-status-format " #I:#W "

##### 其他提升 #####

# 历史记录更长（避免滚动丢失）
set -g history-limit 10000

# 自动重命名窗口
set-option -g allow-rename on

# 禁止自动关闭窗口提示
set-option -g detach-on-destroy off

# 状态栏刷新
refresh-client -S

'"'# 0 is too far from ` ;)
set -g base-index 1

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

#set -g default-terminal screen-256color
set -g status-keys vi
set -g history-limit 10000

setw -g mode-keys vi
setw -g mode-mouse on
setw -g monitor-activity on

bind-key v split-window -h
bind-key s split-window -v

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-h resize-pane -L
bind-key M-l resize-pane -R

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D 
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# No delay for escape key press
set -sg escape-time 0

# Reload tmux config
bind r source-file ~/.tmux.conf

